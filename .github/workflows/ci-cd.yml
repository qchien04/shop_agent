name: Python Agent CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

permissions:
  contents: read

jobs:
  # --------------------------------------------------
  # Job 1: Build & Push Docker Image to Docker Hub
  # --------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/python-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------
  # Job 2: Deploy to VPS via SSH and join Network
  # --------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "==== LOG IN DOCKER HUB ===="
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            echo "==== PULL LATEST IMAGE ===="
            docker pull ${{ secrets.DOCKER_USERNAME }}/python-agent:latest
            
            echo "==== STOP & REMOVE EXISTING CONTAINER ===="
            docker stop python-agent || true
            docker rm python-agent || true
            
            echo "==== CREATE APP DIRECTORY IF NOT EXIST ===="
            mkdir -p ~/python_agent
            
            echo "==== WRITE ENV FILE FROM GITHUB SECRET ===="
            cat > ~/python_agent/.env << ENVEOF
            ${{ secrets.ENV_FILE }}
            ENVEOF
            
            echo "==== START NEW CONTAINER & JOIN NETWORK ===="
            docker run -d \
              --name python-agent \
              --network app-network \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file ~/python_agent/.env \
              ${{ secrets.DOCKER_USERNAME }}/python-agent:latest
            
            echo "==== CLEANUP OLD IMAGES ===="
            docker image prune -f
            
            echo "==== DEPLOY SUCCESSFUL ===="
