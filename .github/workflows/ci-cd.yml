name: CI/CD - Build & Deploy Python Agent

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/python-agent:latest
            ${{ secrets.DOCKER_USERNAME }}/python-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "==== LOG IN DOCKER HUB ===="
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            echo "==== PULL LATEST IMAGE ===="
            docker pull ${{ secrets.DOCKER_USERNAME }}/python-agent:latest
            
            echo "==== STOP & REMOVE EXISTING CONTAINER ===="
            docker stop python-agent || true
            docker rm python-agent || true
            
            echo "==== CREATE APP DIRECTORY IF NOT EXIST ===="
            mkdir -p ~/python_agent
            
            echo "==== WRITE ENV FILE FROM GITHUB SECRET ===="
            cat > ~/python_agent/.env << ENVEOF
            ${{ secrets.ENV_FILE }}
            ENVEOF
            
            echo "==== START NEW CONTAINER & JOIN NETWORK ===="
            docker run -d \
              --name python-agent \
              --network shop-backend_app-network \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file ~/python_agent/.env \
              ${{ secrets.DOCKER_USERNAME }}/python-agent:latest
            
            echo "==== CLEANUP OLD IMAGES ===="
            docker image prune -f
            
            echo "==== DEPLOY SUCCESSFUL ===="
